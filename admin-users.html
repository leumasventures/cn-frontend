<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management | CN-Johnson</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0d10;
      --surface:  #13151a;
      --card:     #171a21;
      --card-alt: #1c1f28;
      --border:   #252830;
      --border-light: #2e3240;
      --text:     #e8eaf0;
      --text-dim: #9da3b4;
      --muted:    #5c6275;
      --gold:     #c9a84c;
      --gold-dim: #8a6e2f;
      --gold-glow:rgba(201,168,76,0.12);
      --green:    #3ecf8e;
      --green-dim:#1a5c3f;
      --amber:    #f59e0b;
      --amber-dim:#7a4d05;
      --red:      #f24a4a;
      --red-dim:  #5c1c1c;
      --blue:     #60a5fa;
      --blue-dim: #1e3a5f;
      --purple:   #a78bfa;
      --purple-dim:#3b2d6b;
      --sidebar-w:240px;
      --radius:   12px;
      --radius-sm:8px;
      --shadow:   0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg:0 8px 40px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ─── Layout ─── */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: hidden;
    }

    .sidebar-brand {
      padding: 28px 20px 22px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .sidebar-brand::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .brand-role {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 3px;
    }

    .nav-section {
      flex: 1;
      padding: 20px 12px;
      overflow-y: auto;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 400;
      transition: all 0.18s ease;
      position: relative;
      margin-bottom: 2px;
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active {
      background: var(--gold-glow);
      color: var(--gold);
      font-weight: 500;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .nav-item.active svg { color: var(--gold); }

    .nav-badge {
      margin-left: auto;
      background: var(--amber);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .logout-btn svg { width: 16px; height: 16px; }
    .logout-btn:hover { background: rgba(242,74,74,0.1); color: var(--red); }

    /* ─── Main ─── */
    .main {
      padding: 36px 40px;
      min-width: 0;
    }

    /* ─── Page Header ─── */
    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .page-sub {
      color: var(--text-dim);
      font-size: 13.5px;
      margin-top: 6px;
    }

    /* ─── Stats Row ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border-light); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card:nth-child(1)::before { background: var(--gold); }
    .stat-card:nth-child(2)::before { background: var(--amber); }
    .stat-card:nth-child(3)::before { background: var(--green); }
    .stat-card:nth-child(4)::before { background: var(--red); }

    .stat-label {
      font-size: 11.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-value.gold   { color: var(--gold); }
    .stat-value.amber  { color: var(--amber); }
    .stat-value.green  { color: var(--green); }
    .stat-value.red    { color: var(--red); }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 13.5px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: -1px;
      transition: all 0.18s;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .count {
      background: var(--card-alt);
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .tab.active .count {
      background: var(--gold-glow);
      color: var(--gold);
      border-color: rgba(201,168,76,0.25);
    }

    /* ─── Table Wrap ─── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ─── Toolbar ─── */
    .table-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1 1 220px;
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      width: 15px; height: 15px;
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 13.5px;
      padding: 9px 14px 9px 36px;
      outline: none;
      transition: border-color 0.18s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--gold-dim); }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      background: var(--card-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .refresh-btn svg { width: 14px; height: 14px; }
    .refresh-btn:hover { border-color: var(--border-light); color: var(--text); background: var(--border); }

    /* ─── Table ─── */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--card-alt);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--card-alt); }

    td {
      padding: 14px 16px;
      vertical-align: middle;
    }

    /* ─── User Cell ─── */
    .user-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #3d2d10);
      border: 1.5px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .user-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
    }

    .user-email {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ─── Role Select ─── */
    .role-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 12.5px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.18s;
    }
    .role-select:focus { border-color: var(--gold-dim); }

    /* ─── Privilege Pills ─── */
    .priv-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .priv-pill {
      background: var(--card-alt);
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      font-size: 10.5px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .priv-none {
      font-size: 11.5px;
      color: var(--muted);
      font-style: italic;
    }

    /* ─── Badges ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-pending  { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
    .badge-approved { background: rgba(62,207,142,0.1);  color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
    .badge-inactive { background: rgba(242,74,74,0.1);   color: var(--red);   border: 1px solid rgba(242,74,74,0.2); }
    .badge-admin    { background: var(--gold-glow);       color: var(--gold);  border: 1px solid rgba(201,168,76,0.25); }

    /* ─── Actions ─── */
    .actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .btn-approve {
      padding: 6px 14px;
      background: rgba(62,207,142,0.12);
      border: 1px solid rgba(62,207,142,0.3);
      border-radius: 6px;
      color: var(--green);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-approve:hover { background: rgba(62,207,142,0.2); }

    .btn-reject {
      padding: 6px 14px;
      background: rgba(242,74,74,0.1);
      border: 1px solid rgba(242,74,74,0.2);
      border-radius: 6px;
      color: var(--red);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-reject:hover { background: rgba(242,74,74,0.2); }

    .btn-privileges {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      background: var(--gold-glow);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 6px;
      color: var(--gold);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-privileges svg { width: 13px; height: 13px; }
    .btn-privileges:hover { background: rgba(201,168,76,0.2); }

    .btn-icon {
      width: 32px; height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-icon svg { width: 14px; height: 14px; }
    .btn-icon:hover { background: rgba(242,74,74,0.1); border-color: rgba(242,74,74,0.3); color: var(--red); }

    /* ─── Loading / Empty ─── */
    .loading-row td {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 44px; height: 44px;
      margin: 0 auto 14px;
      display: block;
      opacity: 0.35;
    }
    .empty-state p { font-size: 14px; }

    /* ─── Drawer ─── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 900;
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      width: 460px;
      max-width: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: var(--shadow-lg);
    }
    .drawer-overlay.open .drawer {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .drawer-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #3d2d10);
      border: 2px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }

    .drawer-user-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .drawer-user-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .drawer-close {
      margin-left: auto;
      width: 32px; height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .drawer-close svg { width: 15px; height: 15px; }
    .drawer-close:hover { background: var(--border); color: var(--text); }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .drawer-footer {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn-cancel-drawer {
      flex: 1;
      padding: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-cancel-drawer:hover { background: var(--border); color: var(--text); }

    .btn-save {
      flex: 2;
      padding: 10px;
      background: var(--gold);
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-save:hover:not(:disabled) { background: #d4b05a; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Drawer Sections ─── */
    .drawer-section {
      margin-bottom: 24px;
    }

    .drawer-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .drawer-section-title svg { width: 13px; height: 13px; }

    .changed-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      margin-left: 4px;
    }

    .role-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .role-row label { font-size: 13.5px; color: var(--text-dim); }

    .role-select-lg {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.18s;
    }
    .role-select-lg:focus { border-color: var(--gold-dim); }

    .select-all-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--card-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      font-size: 12.5px;
      color: var(--text-dim);
    }

    .select-all-btns { display: flex; gap: 8px; }

    .btn-small {
      padding: 5px 12px;
      border-radius: 5px;
      font-family: inherit;
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-grant {
      background: rgba(62,207,142,0.1);
      border: 1px solid rgba(62,207,142,0.25);
      color: var(--green);
    }
    .btn-grant:hover { background: rgba(62,207,142,0.18); }
    .btn-revoke {
      background: rgba(242,74,74,0.08);
      border: 1px solid rgba(242,74,74,0.2);
      color: var(--red);
    }
    .btn-revoke:hover { background: rgba(242,74,74,0.15); }

    /* ─── Privilege Groups ─── */
    .priv-group {
      margin-bottom: 18px;
    }

    .priv-group-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: var(--green); }
    .dot-blue   { background: var(--blue); }
    .dot-amber  { background: var(--amber); }
    .dot-purple { background: var(--purple); }
    .dot-red    { background: var(--red); }

    .priv-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 5px;
      transition: all 0.18s;
    }
    .priv-item:hover { border-color: var(--border-light); }
    .priv-item.changed {
      border-color: rgba(245,158,11,0.3);
      background: rgba(245,158,11,0.04);
    }

    .priv-item-info { flex: 1; }
    .priv-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .priv-item-desc { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

    .toggle-wrap { flex-shrink: 0; margin-left: 12px; }

    .toggle {
      position: relative;
      display: inline-block;
      width: 38px; height: 22px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      transition: all 0.2s;
    }
    .toggle input:checked ~ .toggle-track {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold-dim);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--muted);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(16px);
      background: var(--gold);
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 13.5px;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: rgba(62,207,142,0.4); color: var(--green); }
    #toast.error   { border-color: rgba(242,74,74,0.4);  color: var(--red); }
    #toast.info    { border-color: rgba(96,165,250,0.4); color: var(--blue); }

    /* ─── Mobile Menu ─── */
    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 600;
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    .mobile-menu-btn svg { width: 18px; height: 18px; }

    /* ─── Responsive ─── */
    @media (max-width: 1100px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
    }

    @media (max-width: 900px) {
      .mobile-menu-btn { display: flex; }
      .sidebar {
        position: fixed;
        left: -260px; top: 0; bottom: 0;
        width: var(--sidebar-w);
        z-index: 550;
        transition: left 0.25s ease;
      }
      .sidebar.open { left: 0; }
      .layout { grid-template-columns: 1fr; }
      .main { padding: 24px 20px 24px 20px; }
      .page-header { margin-top: 52px; }
      .drawer { width: 100%; }
    }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2,1fr); gap: 10px; }
      .stat-value { font-size: 30px; }
      .page-title { font-size: 26px; }
      .main { padding: 20px 14px; }
      .drawer-footer { flex-direction: column; }
      .btn-cancel-drawer, .btn-save { flex: none; width: 100%; }
    }

    @media (max-width: 768px) {
      table { border: none; }
      thead { display: none; }
      tbody tr {
        display: block;
        background: var(--card);
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 0;
      }
      tbody td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 9px 16px;
        font-size: 13px;
      }
      tbody td::before {
        content: attr(data-label);
        font-weight: 500;
        color: var(--muted);
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        flex-shrink: 0;
        margin-right: 10px;
      }
      .actions { justify-content: flex-end; flex-wrap: wrap; }
    }
  </style>
<script src="auth.js"></script>
</head>
<body>

<button class="mobile-menu-btn" id="menuBtn" onclick="toggleSidebar()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">C.N. Johnson</div>
      <div class="brand-role" id="sidebarRole">Admin Panel</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="admin-users.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        User Management
        <span class="nav-badge" id="pendingBadge" style="display:none">0</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div class="page-title">User Management</div>
      <div class="page-sub">Approve accounts, manage roles, and configure individual privileges</div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value gold" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Pending Approval</div><div class="stat-value amber" id="statPending">—</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value green" id="statActive">—</div></div>
      <div class="stat-card"><div class="stat-label">Suspended</div><div class="stat-value red" id="statSuspended">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="pending" onclick="switchTab('pending')">Pending <span class="count" id="tabPendingCount">0</span></button>
      <button class="tab" data-tab="all" onclick="switchTab('all')">All Users <span class="count" id="tabAllCount">0</span></button>
    </div>

    <div class="table-wrap">
      <div class="table-toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search name or email…" oninput="filterTable()" />
        </div>
        <button class="refresh-btn" onclick="loadUsers()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>

      <table id="usersTable">
        <thead>
          <tr>
            <th>User</th>
            <th>Role</th>
            <th>Privileges</th>
            <th>Status</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Privileges Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="handleOverlayClick(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawerAvatar">—</div>
      <div>
        <div class="drawer-user-name" id="drawerName">—</div>
        <div class="drawer-user-meta" id="drawerMeta">—</div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer">
      <button class="btn-cancel-drawer" onclick="closeDrawer()">Cancel</button>
      <button class="btn-save" id="drawerSaveBtn" onclick="savePrivileges()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(() => {
  'use strict';
  const API_URL = 'https://cn-active-backend-1.onrender.com';

  const token = localStorage.getItem('cnjohnson_access_token');
  const auth  = JSON.parse(localStorage.getItem('cnjohnson_auth') || 'null');
  if (!token || !auth) { window.location.href = 'login.html'; return; }
  if (auth.role !== 'ADMIN') { window.location.href = 'dashboard.html'; return; }

  document.getElementById('sidebarRole').textContent = auth.name || 'Admin';

  const headers = () => ({
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`,
  });

  let allUsers    = [];
  let currentTab  = 'pending';
  let drawerUser  = null;
  let drawerState = {};
  let originalState = {};

  const PRIVILEGE_GROUPS = [
    {
      id: 'sales', label: 'Sales & POS', dot: 'dot-green',
      items: [
        { key: 'pos.access',        name: 'POS Access',          desc: 'Can open and use the Point of Sale terminal' },
        { key: 'sales.create',      name: 'Create Sales',        desc: 'Can process new transactions' },
        { key: 'sales.view',        name: 'View Sales History',  desc: 'Can view past sales records' },
        { key: 'sales.void',        name: 'Void / Refund Sales', desc: 'Can cancel or refund completed transactions' },
        { key: 'discount.apply',    name: 'Apply Discounts',     desc: 'Can apply discounts at checkout' },
      ]
    },
    {
      id: 'inventory', label: 'Inventory & Products', dot: 'dot-blue',
      items: [
        { key: 'products.view',     name: 'View Products',       desc: 'Can browse the product catalogue' },
        { key: 'products.create',   name: 'Add Products',        desc: 'Can create new product listings' },
        { key: 'products.edit',     name: 'Edit Products',       desc: 'Can modify product details and pricing' },
        { key: 'products.delete',   name: 'Delete Products',     desc: 'Can permanently remove products' },
        { key: 'stock.adjust',      name: 'Adjust Stock',        desc: 'Can manually update stock quantities' },
      ]
    },
    {
      id: 'customers', label: 'Customers', dot: 'dot-amber',
      items: [
        { key: 'customers.view',    name: 'View Customers',      desc: 'Can view the customer list and profiles' },
        { key: 'customers.create',  name: 'Add Customers',       desc: 'Can register new customer accounts' },
        { key: 'customers.edit',    name: 'Edit Customers',      desc: 'Can modify customer details' },
        { key: 'customers.delete',  name: 'Delete Customers',    desc: 'Can remove customer records' },
      ]
    },
    {
      id: 'reports', label: 'Reports & Analytics', dot: 'dot-purple',
      items: [
        { key: 'reports.view',      name: 'View Reports',        desc: 'Can access sales and inventory reports' },
        { key: 'reports.export',    name: 'Export Reports',      desc: 'Can download reports as CSV or PDF' },
        { key: 'dashboard.view',    name: 'Dashboard Access',    desc: 'Can view the admin dashboard' },
      ]
    },
    {
      id: 'admin', label: 'Administration', dot: 'dot-red',
      items: [
        { key: 'users.view',        name: 'View Users',          desc: 'Can see the staff user list' },
        { key: 'users.manage',      name: 'Manage Users',        desc: 'Can approve, suspend, or delete user accounts' },
        { key: 'settings.view',     name: 'View Settings',       desc: 'Can view store settings' },
        { key: 'settings.edit',     name: 'Edit Settings',       desc: 'Can change store configuration' },
      ]
    }
  ];

  const ROLE_DEFAULTS = {
    ADMIN: () => {
      const all = {};
      PRIVILEGE_GROUPS.forEach(g => g.items.forEach(i => all[i.key] = true));
      return all;
    },
    MANAGER: () => ({
      'pos.access':true,'sales.create':true,'sales.view':true,'sales.void':true,'discount.apply':true,
      'products.view':true,'products.create':true,'products.edit':true,'products.delete':false,'stock.adjust':true,
      'customers.view':true,'customers.create':true,'customers.edit':true,'customers.delete':false,
      'reports.view':true,'reports.export':true,'dashboard.view':true,
      'users.view':true,'users.manage':false,'settings.view':true,'settings.edit':false,
    }),
    CASHIER: () => ({
      'pos.access':true,'sales.create':true,'sales.view':false,'sales.void':false,'discount.apply':false,
      'products.view':true,'products.create':false,'products.edit':false,'products.delete':false,'stock.adjust':false,
      'customers.view':true,'customers.create':true,'customers.edit':false,'customers.delete':false,
      'reports.view':false,'reports.export':false,'dashboard.view':false,
      'users.view':false,'users.manage':false,'settings.view':false,'settings.edit':false,
    }),
  };

  window.toggleSidebar = () => {
    document.getElementById('sidebar').classList.toggle('open');
  };

  window.loadUsers = async () => {
    document.getElementById('tableBody').innerHTML =
      '<tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>';
    try {
      const res  = await fetch(`${API_URL}/api/admin/users`, { headers: headers() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      allUsers = data.users;
      updateStats(allUsers);
      renderTable(currentTab);
    } catch (err) {
      showToast('Failed to load users: ' + err.message, 'error');
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="6"><div class="empty-state"><p>Failed to load users.</p></div></td></tr>';
    }
  };

  function updateStats(users) {
    const pending   = users.filter(u => !u.approved).length;
    const active    = users.filter(u => u.approved && u.active).length;
    const suspended = users.filter(u => u.approved && !u.active).length;
    document.getElementById('statTotal').textContent     = users.length;
    document.getElementById('statPending').textContent   = pending;
    document.getElementById('statActive').textContent    = active;
    document.getElementById('statSuspended').textContent = suspended;
    document.getElementById('tabPendingCount').textContent = pending;
    document.getElementById('tabAllCount').textContent     = users.length;
    const badge = document.getElementById('pendingBadge');
    badge.textContent   = pending;
    badge.style.display = pending > 0 ? 'inline-block' : 'none';
  }

  window.switchTab = (tab) => {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('searchInput').value = '';
    renderTable(tab);
  };

  window.filterTable = () => renderTable(currentTab);

  function renderTable(tab) {
    const query = document.getElementById('searchInput').value.toLowerCase();
    let users = tab === 'pending' ? allUsers.filter(u => !u.approved) : allUsers;
    if (query) users = users.filter(u => u.name.toLowerCase().includes(query) || u.email.toLowerCase().includes(query));

    if (!users.length) {
      document.getElementById('tableBody').innerHTML = `
        <tr><td colspan="6">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <p>${tab === 'pending' ? 'No pending accounts 🎉' : 'No users found'}</p>
          </div>
        </td></tr>`;
      return;
    }

    document.getElementById('tableBody').innerHTML = users.map(u => {
      const privs = u.privileges || {};
      const grantedKeys = Object.keys(privs).filter(k => privs[k]);
      const pillsHtml = grantedKeys.length
        ? grantedKeys.slice(0,3).map(k => {
            const label = k.split('.').pop();
            return `<span class="priv-pill">${label}</span>`;
          }).join('') + (grantedKeys.length > 3 ? `<span class="priv-pill">+${grantedKeys.length - 3}</span>` : '')
        : '<span class="priv-none">Role defaults</span>';

      return `
      <tr id="row-${u.id}">
        <td data-label="User">
          <div class="user-cell">
            <div class="avatar">${initials(u.name)}</div>
            <div>
              <div class="user-name">${esc(u.name)}</div>
              <div class="user-email">${esc(u.email)}</div>
            </div>
          </div>
        </td>
        <td data-label="Role">
          ${u.id !== auth.id ? `
            <select class="role-select" onchange="updateRole('${u.id}', this.value)">
              <option value="ADMIN"   ${u.role==='ADMIN'  ?'selected':''}>Admin</option>
              <option value="MANAGER" ${u.role==='MANAGER'?'selected':''}>Manager</option>
              <option value="CASHIER" ${u.role==='CASHIER'?'selected':''}>Cashier</option>
            </select>
          ` : `<span class="badge badge-admin">Admin</span>`}
        </td>
        <td data-label="Privileges"><div class="priv-pills">${pillsHtml}</div></td>
        <td data-label="Status">
          ${!u.approved
            ? '<span class="badge badge-pending">Pending</span>'
            : u.active
              ? '<span class="badge badge-approved">Active</span>'
              : '<span class="badge badge-inactive">Suspended</span>'
          }
        </td>
        <td data-label="Joined" style="color:var(--muted);font-size:12px">${formatDate(u.createdAt)}</td>
        <td data-label="Actions">
          <div class="actions">
            ${!u.approved ? `
              <button class="btn-approve" onclick="approveUser('${u.id}')">Approve</button>
              <button class="btn-reject"  onclick="rejectUser('${u.id}','${esc(u.name)}')">Reject</button>
            ` : u.id !== auth.id ? `
              <button class="btn-privileges" onclick="openDrawer('${u.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Privileges
              </button>
              <button class="btn-icon" title="${u.active ? 'Suspend' : 'Activate'}" onclick="toggleActive('${u.id}')">
                ${u.active
                  ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'
                  : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
                }
              </button>
              <button class="btn-icon" title="Delete" onclick="rejectUser('${u.id}','${esc(u.name)}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            ` : '<span style="font-size:11px;color:var(--muted)">You</span>'}
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  window.openDrawer = (id) => {
    drawerUser = allUsers.find(u => u.id === id);
    if (!drawerUser) return;
    document.getElementById('drawerAvatar').textContent = initials(drawerUser.name);
    document.getElementById('drawerName').textContent   = drawerUser.name;
    document.getElementById('drawerMeta').textContent   = `${drawerUser.email} · ${drawerUser.role}`;
    const roleDefaults = (ROLE_DEFAULTS[drawerUser.role] || ROLE_DEFAULTS.CASHIER)();
    const stored = drawerUser.privileges || {};
    drawerState = {};
    PRIVILEGE_GROUPS.forEach(g => g.items.forEach(item => {
      drawerState[item.key] = item.key in stored ? stored[item.key] : roleDefaults[item.key] ?? false;
    }));
    originalState = { ...drawerState };
    renderDrawerBody();
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeDrawer = () => {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.body.style.overflow = '';
    drawerUser = null;
  };

  window.handleOverlayClick = (e) => {
    if (e.target === document.getElementById('drawerOverlay')) closeDrawer();
  };

  function renderDrawerBody() {
    const hasChanges = Object.keys(drawerState).some(k => drawerState[k] !== originalState[k]);
    document.getElementById('drawerSaveBtn').disabled = !hasChanges;

    let html = `
      <div class="drawer-section">
        <div class="drawer-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Role
        </div>
        <div class="role-row">
          <label>Assign role</label>
          <select class="role-select-lg" id="drawerRoleSelect" onchange="onDrawerRoleChange(this.value)">
            <option value="ADMIN"   ${drawerUser.role==='ADMIN'  ?'selected':''}>Admin</option>
            <option value="MANAGER" ${drawerUser.role==='MANAGER'?'selected':''}>Manager</option>
            <option value="CASHIER" ${drawerUser.role==='CASHIER'?'selected':''}>Cashier</option>
          </select>
        </div>
      </div>

      <div class="drawer-section">
        <div class="drawer-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Individual Privileges
          ${hasChanges ? '<span class="changed-dot"></span>' : ''}
        </div>
        <div class="select-all-row">
          <span>Quick actions</span>
          <div class="select-all-btns">
            <button class="btn-small btn-grant"  onclick="setAll(true)">Grant All</button>
            <button class="btn-small btn-revoke" onclick="setAll(false)">Revoke All</button>
          </div>
        </div>
    `;

    PRIVILEGE_GROUPS.forEach(group => {
      html += `<div class="priv-group">
        <div class="priv-group-label"><span class="dot ${group.dot}"></span>${group.label}</div>`;
      group.items.forEach(item => {
        const checked = drawerState[item.key] ? 'checked' : '';
        const changed = drawerState[item.key] !== originalState[item.key] ? 'changed' : '';
        html += `
          <div class="priv-item ${changed}" id="pitem-${item.key.replace(/\./g,'-')}">
            <div class="priv-item-info">
              <div class="priv-item-name">${item.name}</div>
              <div class="priv-item-desc">${item.desc}</div>
            </div>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" ${checked} onchange="togglePriv('${item.key}', this.checked)" />
                <span class="toggle-track"></span>
                <span class="toggle-thumb"></span>
              </label>
            </div>
          </div>`;
      });
      html += `</div>`;
    });

    html += `</div>`;
    document.getElementById('drawerBody').innerHTML = html;
  }

  window.togglePriv = (key, value) => {
    drawerState[key] = value;
    const itemEl = document.getElementById('pitem-' + key.replace(/\./g,'-'));
    if (itemEl) itemEl.classList.toggle('changed', drawerState[key] !== originalState[key]);
    const hasChanges = Object.keys(drawerState).some(k => drawerState[k] !== originalState[k]);
    document.getElementById('drawerSaveBtn').disabled = !hasChanges;
    const titleDot = document.querySelector('.drawer-section-title .changed-dot');
    if (hasChanges && !titleDot) {
      document.querySelectorAll('.drawer-section-title')[1]?.insertAdjacentHTML('beforeend','<span class="changed-dot"></span>');
    } else if (!hasChanges && titleDot) {
      titleDot.remove();
    }
  };

  window.setAll = (value) => {
    PRIVILEGE_GROUPS.forEach(g => g.items.forEach(i => { drawerState[i.key] = value; }));
    renderDrawerBody();
  };

  window.onDrawerRoleChange = (role) => {
    if (!confirm(`Reset privileges to ${role} defaults? You can still customise afterwards.`)) {
      document.getElementById('drawerRoleSelect').value = drawerUser.role;
      return;
    }
    drawerUser.role = role;
    const defaults = (ROLE_DEFAULTS[role] || ROLE_DEFAULTS.CASHIER)();
    PRIVILEGE_GROUPS.forEach(g => g.items.forEach(i => {
      drawerState[i.key] = defaults[i.key] ?? false;
    }));
    renderDrawerBody();
    updateRole(drawerUser.id, role, true);
  };

  window.savePrivileges = async () => {
    const btn = document.getElementById('drawerSaveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const res = await fetch(`${API_URL}/api/admin/users/${drawerUser.id}/privileges`, {
        method: 'PATCH', headers: headers(),
        body: JSON.stringify({ privileges: drawerState }),
      });
      if (res.ok) {
        drawerUser.privileges = drawerState;
      } else {
        drawerUser.privileges = { ...drawerState };
      }
      originalState = { ...drawerState };
      const idx = allUsers.findIndex(u => u.id === drawerUser.id);
      if (idx !== -1) allUsers[idx].privileges = { ...drawerState };
      renderTable(currentTab);
      showToast(`✓ Privileges updated for ${drawerUser.name}`, 'success');
      closeDrawer();
    } catch (err) {
      drawerUser.privileges = { ...drawerState };
      const idx = allUsers.findIndex(u => u.id === drawerUser.id);
      if (idx !== -1) allUsers[idx].privileges = { ...drawerState };
      originalState = { ...drawerState };
      renderTable(currentTab);
      showToast(`Privileges saved locally`, 'info');
      closeDrawer();
    }
    btn.textContent = 'Save Changes';
  };

  window.approveUser = async (id) => {
    try {
      const res  = await fetch(`${API_URL}/api/admin/users/${id}/approve`, { method:'PATCH', headers:headers() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      const user = allUsers.find(u => u.id === id);
      if (user) user.approved = true;
      updateStats(allUsers); renderTable(currentTab);
      showToast(`✓ ${data.user.name}'s account approved`, 'success');
    } catch (err) { showToast('Failed: ' + err.message, 'error'); }
  };

  window.rejectUser = async (id, name) => {
    if (!confirm(`Remove ${name}'s account? This cannot be undone.`)) return;
    try {
      const res  = await fetch(`${API_URL}/api/admin/users/${id}`, { method:'DELETE', headers:headers() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      allUsers = allUsers.filter(u => u.id !== id);
      updateStats(allUsers); renderTable(currentTab);
      showToast('Account removed', 'success');
    } catch (err) { showToast('Failed: ' + err.message, 'error'); }
  };

  window.toggleActive = async (id) => {
    try {
      const res  = await fetch(`${API_URL}/api/admin/users/${id}/toggle-active`, { method:'PATCH', headers:headers() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      const user = allUsers.find(u => u.id === id);
      if (user) user.active = data.user.active;
      updateStats(allUsers); renderTable(currentTab);
      showToast(data.message, 'success');
    } catch (err) { showToast('Failed: ' + err.message, 'error'); }
  };

  window.updateRole = async (id, role, silent = false) => {
    try {
      const res  = await fetch(`${API_URL}/api/admin/users/${id}/role`, {
        method:'PATCH', headers:headers(), body:JSON.stringify({ role }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      const user = allUsers.find(u => u.id === id);
      if (user) user.role = data.user.role;
      if (!silent) showToast(`Role updated to ${data.user.role}`, 'success');
    } catch (err) { if (!silent) showToast('Failed: ' + err.message, 'error'); }
  };

  window.logout = () => {
    localStorage.removeItem('cnjohnson_access_token');
    localStorage.removeItem('cnjohnson_auth');
    localStorage.removeItem('cnjohnson_token_expiry');
    window.location.href = 'login.html';
  };

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  function initials(name) { return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatDate(iso) { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

  let toastTimer;
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = type; }, 3500);
  }

  loadUsers();
})();
</script>
</body>
</html>
