<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | CN-Johnson</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0b0b; --surface: #111; --card: #161616; --border: #242424;
      --gold: #c9a84c; --gold-light: #e2c47a; --gold-dim: rgba(201,168,76,0.1);
      --text: #f0ece4; --muted: #6b6560; --subtle: #1e1e1e;
      --green: #22c55e; --green-bg: rgba(34,197,94,0.08); --green-border: rgba(34,197,94,0.25);
      --red: #ef4444; --red-bg: rgba(239,68,68,0.08); --red-border: rgba(239,68,68,0.25);
      --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.08); --amber-border: rgba(245,158,11,0.25);
      --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.08); --blue-border: rgba(96,165,250,0.25);
      --radius: 10px; --ease: 0.18s ease;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 80% 10%, rgba(201,168,76,0.04) 0%, transparent 55%); pointer-events:none; z-index:0; }

    .layout { display:grid; grid-template-columns:220px 1fr; min-height:100vh; position:relative; z-index:1; }

    /* Sidebar */
    .sidebar { background:var(--surface); border-right:1px solid var(--border); padding:28px 0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
    .sidebar-brand { padding:0 20px 24px; border-bottom:1px solid var(--border); margin-bottom:16px; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--gold); letter-spacing:0.04em; }
    .brand-role { font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }
    .nav-section { padding:0 12px; margin-bottom:4px; }
    .nav-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding:8px 8px 4px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; color:var(--muted); font-size:13px; cursor:pointer; text-decoration:none; transition:all var(--ease); margin-bottom:2px; }
    .nav-item:hover { background:var(--subtle); color:var(--text); }
    .nav-item.active { background:var(--gold-dim); color:var(--gold); }
    .nav-item svg { width:15px; height:15px; flex-shrink:0; }
    .sidebar-footer { margin-top:auto; padding:16px 12px 0; border-top:1px solid var(--border); }
    .logout-btn { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; color:var(--muted); font-size:13px; cursor:pointer; border:none; background:none; width:100%; transition:all var(--ease); font-family:'DM Sans',sans-serif; }
    .logout-btn:hover { background:var(--red-bg); color:var(--red); }
    .logout-btn svg { width:15px; height:15px; }

    /* Main */
    .main { padding:36px 40px; overflow-y:auto; }
    .page-header { margin-bottom:28px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
    .page-header-left {}
    .page-title { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; color:var(--text); margin-bottom:4px; }
    .page-sub { font-size:13px; color:var(--muted); }
    .btn-add { padding:10px 18px; background:linear-gradient(135deg,#c9a84c,#a8863a); border:none; border-radius:8px; color:#0d0d0d; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px; transition:opacity var(--ease); white-space:nowrap; }
    .btn-add:hover { opacity:0.88; }
    .btn-add svg { width:14px; height:14px; }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; animation:fadeUp 0.4s ease both; }
    .stat-card:nth-child(1){animation-delay:.05s} .stat-card:nth-child(2){animation-delay:.1s} .stat-card:nth-child(3){animation-delay:.15s} .stat-card:nth-child(4){animation-delay:.2s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .stat-label { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .stat-value { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:700; line-height:1; }
    .stat-value.gold{color:var(--gold)} .stat-value.amber{color:var(--amber)} .stat-value.green{color:var(--green)} .stat-value.red{color:var(--red)}

    /* Toolbar */
    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; max-width:320px; }
    .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); width:14px; height:14px; pointer-events:none; }
    .search-input { width:100%; padding:9px 12px 9px 34px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color var(--ease); }
    .search-input:focus { border-color:var(--gold); }
    .search-input::placeholder { color:#3a3630; }
    .filter-select { padding:9px 12px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; cursor:pointer; transition:border-color var(--ease); }
    .filter-select:focus { border-color:var(--gold); }
    .btn-refresh { padding:9px 14px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:6px; transition:all var(--ease); }
    .btn-refresh:hover { border-color:var(--gold); color:var(--gold); }
    .btn-refresh svg { width:13px; height:13px; }

    /* Table */
    .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; animation:fadeUp 0.4s 0.25s ease both; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:11px 16px; text-align:left; font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); background:rgba(255,255,255,0.01); white-space:nowrap; }
    tbody tr { border-bottom:1px solid var(--border); transition:background var(--ease); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,0.02); }
    tbody td { padding:12px 16px; font-size:13px; vertical-align:middle; }

    .prod-name-cell { display:flex; align-items:center; gap:10px; }
    .prod-icon { width:34px; height:34px; border-radius:8px; background:var(--gold-dim); border:1px solid rgba(201,168,76,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .prod-icon svg { width:15px; height:15px; color:var(--gold); }
    .prod-name { font-weight:400; color:var(--text); }
    .prod-sku { font-size:11px; color:var(--muted); margin-top:1px; }

    .price-cell { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:600; color:var(--gold); }
    .cost-cell { font-size:12px; color:var(--muted); }

    .stock-cell { display:flex; align-items:center; gap:6px; }
    .stock-num { font-weight:500; }
    .stock-num.ok { color:var(--green); }
    .stock-num.low { color:var(--amber); }
    .stock-num.out { color:var(--red); }
    .stock-bar { width:40px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .stock-bar-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }
    .stock-bar-fill.ok { background:var(--green); }
    .stock-bar-fill.low { background:var(--amber); }
    .stock-bar-fill.out { background:var(--red); }

    .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:500; }
    .badge-active { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); }
    .badge-inactive { background:var(--red-bg); border:1px solid var(--red-border); color:var(--red); }

    .actions { display:flex; align-items:center; gap:6px; }
    .btn-icon { width:30px; height:30px; border-radius:6px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all var(--ease); }
    .btn-icon:hover { border-color:var(--gold); color:var(--gold); }
    .btn-icon.danger:hover { border-color:var(--red); color:var(--red); }
    .btn-icon svg { width:13px; height:13px; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state svg { width:40px; height:40px; margin:0 auto 12px; opacity:0.25; display:block; }
    .empty-state p { font-size:14px; margin-bottom:16px; }
    .loading-row td { text-align:center; padding:40px; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(4px); z-index:500; opacity:0; pointer-events:none; transition:opacity 0.2s ease; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; transform:scale(0.96); transition:transform 0.2s ease; }
    .modal-overlay.open .modal { transform:scale(1); }
    .modal::-webkit-scrollbar { width:3px; }
    .modal::-webkit-scrollbar-thumb { background:var(--border); }

    .modal-header { padding:22px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--text); }
    .modal-close { width:30px; height:30px; border-radius:6px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all var(--ease); }
    .modal-close:hover { border-color:var(--red); color:var(--red); }
    .modal-close svg { width:14px; height:14px; }

    .modal-body { padding:24px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group.full { grid-column:1/-1; }
    .form-label { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
    .form-input, .form-select, .form-textarea {
      padding:10px 12px; background:var(--subtle); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px;
      outline:none; transition:border-color var(--ease); width:100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--gold); }
    .form-input::placeholder, .form-textarea::placeholder { color:#3a3630; }
    .form-textarea { resize:vertical; min-height:80px; }
    .form-select option { background:var(--card); }

    .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
    .btn-cancel { padding:10px 18px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all var(--ease); }
    .btn-cancel:hover { border-color:var(--text); color:var(--text); }
    .btn-save { padding:10px 22px; background:linear-gradient(135deg,#c9a84c,#a8863a); border:none; border-radius:8px; color:#0d0d0d; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:opacity var(--ease); }
    .btn-save:hover { opacity:0.88; }
    .btn-save:disabled { opacity:0.4; cursor:not-allowed; }

    /* Section divider inside modal */
    .form-section { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:4px; grid-column:1/-1; margin-top:8px; }

    /* Toast */
    #toast { position:fixed; bottom:24px; right:24px; padding:12px 18px; border-radius:10px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,0.4); transform:translateY(80px); opacity:0; transition:all 0.3s cubic-bezier(0.22,1,0.36,1); z-index:999; pointer-events:none; max-width:320px; }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.success { background:#0d2414; border:1px solid #1a5c30; color:#4ade80; }
    #toast.error   { background:#2a1212; border:1px solid #7f2020; color:#f87171; }

    @media(max-width:900px){ .layout{grid-template-columns:1fr} .sidebar{display:none} .main{padding:20px 16px} .stats-row{grid-template-columns:1fr 1fr} .form-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">C.N. Johnson</div>
      <div class="brand-role" id="sidebarRole">Admin Panel</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="products.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Products
      </a>
      <a href="admin-users.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        User Management
      </a>
      <a href="pos.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Point of Sale
      </a>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">Products</div>
        <div class="page-sub">Manage your product catalogue and stock levels</div>
      </div>
      <button class="btn-add" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Product
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value gold" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">In Stock</div><div class="stat-value green" id="statInStock">—</div></div>
      <div class="stat-card"><div class="stat-label">Low Stock</div><div class="stat-value amber" id="statLow">—</div></div>
      <div class="stat-card"><div class="stat-label">Out of Stock</div><div class="stat-value red" id="statOut">—</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search name, SKU, barcode…" oninput="applyFilters()" />
      </div>
      <select class="filter-select" id="categoryFilter" onchange="applyFilters()">
        <option value="">All Categories</option>
      </select>
      <select class="filter-select" id="stockFilter" onchange="applyFilters()">
        <option value="">All Stock</option>
        <option value="ok">In Stock</option>
        <option value="low">Low Stock</option>
        <option value="out">Out of Stock</option>
      </select>
      <button class="btn-refresh" onclick="loadAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Cost</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Product</div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-section">Basic Information</div>

        <div class="form-group full">
          <label class="form-label">Product Name *</label>
          <input type="text" class="form-input" id="fName" placeholder="e.g. Premium Widget" />
        </div>

        <div class="form-group">
          <label class="form-label">SKU</label>
          <input type="text" class="form-input" id="fSku" placeholder="e.g. WGT-001" />
        </div>

        <div class="form-group">
          <label class="form-label">Barcode</label>
          <input type="text" class="form-input" id="fBarcode" placeholder="e.g. 1234567890123" />
        </div>

        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="fCategory">
            <option value="">No Category</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Unit</label>
          <input type="text" class="form-input" id="fUnit" placeholder="e.g. pcs, kg, litre" />
        </div>

        <div class="form-group full">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="fDescription" placeholder="Optional product description…"></textarea>
        </div>

        <div class="form-section">Pricing & Stock</div>

        <div class="form-group">
          <label class="form-label">Selling Price *</label>
          <input type="number" class="form-input" id="fPrice" placeholder="0.00" min="0" step="0.01" />
        </div>

        <div class="form-group">
          <label class="form-label">Cost Price</label>
          <input type="number" class="form-input" id="fCostPrice" placeholder="0.00" min="0" step="0.01" />
        </div>

        <div class="form-group">
          <label class="form-label">Stock Quantity *</label>
          <input type="number" class="form-input" id="fStock" placeholder="0" min="0" />
        </div>

        <div class="form-group">
          <label class="form-label">Low Stock Threshold</label>
          <input type="number" class="form-input" id="fLowStock" placeholder="5" min="0" />
        </div>

        <div class="form-group">
          <label class="form-label">Tax Rate (%)</label>
          <input type="number" class="form-input" id="fTaxRate" placeholder="0" min="0" max="100" step="0.1" />
        </div>

        <div class="form-group">
          <label class="form-label">Supplier</label>
          <select class="form-select" id="fSupplier">
            <option value="">No Supplier</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(() => {
  'use strict';
  const API = 'https://cn-active-backend-1.onrender.com';

  const token = localStorage.getItem('cnjohnson_access_token');
  const auth  = JSON.parse(localStorage.getItem('cnjohnson_auth') || 'null');
  if (!token || !auth) { window.location.href = 'login.html'; return; }

  document.getElementById('sidebarRole').textContent = auth.name || auth.role;

  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`,
  };

  let allProducts  = [];
  let categories   = [];
  let suppliers    = [];
  let editingId    = null;

  /* ── Load everything ── */
  window.loadAll = async () => {
    document.getElementById('tableBody').innerHTML =
      '<tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>';
    await Promise.all([loadProducts(), loadCategories(), loadSuppliers()]);
  };

  async function loadProducts() {
    try {
      const res  = await fetch(`${API}/api/products?limit=500`, { headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      allProducts = data.products || [];
      updateStats();
      renderTable(allProducts);
    } catch (err) {
      showToast('Failed to load products: ' + err.message, 'error');
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="7"><div class="empty-state"><p>Failed to load products</p></div></td></tr>';
    }
  }

  async function loadCategories() {
    try {
      const res  = await fetch(`${API}/api/products/categories`, { headers });
      const data = await res.json();
      categories = data.categories || data.data || [];
    } catch (_) {
      // Categories endpoint may not exist — that's ok
      categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))].map(c => ({ id: c.id, name: c.name }));
    }
    populateCategorySelects();
  }

  async function loadSuppliers() {
    try {
      const res  = await fetch(`${API}/api/suppliers?limit=200`, { headers });
      const data = await res.json();
      suppliers = data.suppliers || data.data || [];
    } catch (_) {}
    populateSupplierSelect();
  }

  function populateCategorySelects() {
    // Derive from loaded products if API didn't return them
    if (!categories.length) {
      const seen = new Map();
      allProducts.forEach(p => { if (p.category) seen.set(p.category.id, p.category); });
      categories = [...seen.values()];
    }

    const filterSel = document.getElementById('categoryFilter');
    const formSel   = document.getElementById('fCategory');
    const existing  = filterSel.querySelectorAll('option:not([value=""])');
    existing.forEach(o => o.remove());

    categories.forEach(c => {
      filterSel.insertAdjacentHTML('beforeend', `<option value="${c.id}">${esc(c.name)}</option>`);
      formSel.insertAdjacentHTML('beforeend',   `<option value="${c.id}">${esc(c.name)}</option>`);
    });
  }

  function populateSupplierSelect() {
    const sel = document.getElementById('fSupplier');
    sel.querySelectorAll('option:not([value=""])').forEach(o => o.remove());
    suppliers.forEach(s => {
      sel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${esc(s.name)}</option>`);
    });
  }

  /* ── Stats ── */
  function updateStats() {
    const low = 5;
    const inStock = allProducts.filter(p => p.stock > low).length;
    const lowStock = allProducts.filter(p => p.stock > 0 && p.stock <= (p.lowStockThreshold || low)).length;
    const outStock = allProducts.filter(p => p.stock <= 0).length;
    document.getElementById('statTotal').textContent   = allProducts.length;
    document.getElementById('statInStock').textContent = inStock;
    document.getElementById('statLow').textContent     = lowStock;
    document.getElementById('statOut').textContent     = outStock;
  }

  /* ── Filters ── */
  window.applyFilters = () => {
    const q     = document.getElementById('searchInput').value.toLowerCase();
    const catId = document.getElementById('categoryFilter').value;
    const stock = document.getElementById('stockFilter').value;

    let list = allProducts;
    if (q)     list = list.filter(p => p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q) || (p.barcode||'').toLowerCase().includes(q));
    if (catId) list = list.filter(p => p.categoryId === catId);
    if (stock === 'ok')  list = list.filter(p => p.stock > (p.lowStockThreshold || 5));
    if (stock === 'low') list = list.filter(p => p.stock > 0 && p.stock <= (p.lowStockThreshold || 5));
    if (stock === 'out') list = list.filter(p => p.stock <= 0);

    renderTable(list);
  };

  /* ── Render table ── */
  function renderTable(list) {
    if (!list.length) {
      document.getElementById('tableBody').innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            <p>No products found</p>
            <button class="btn-add" onclick="openModal()" style="margin:0 auto">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add your first product
            </button>
          </div>
        </td></tr>`;
      return;
    }

    document.getElementById('tableBody').innerHTML = list.map(p => {
      const threshold  = p.lowStockThreshold || 5;
      const stockClass = p.stock <= 0 ? 'out' : p.stock <= threshold ? 'low' : 'ok';
      const barPct     = Math.min(100, (p.stock / Math.max(p.stock, threshold * 3)) * 100);

      return `
      <tr>
        <td>
          <div class="prod-name-cell">
            <div class="prod-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <div>
              <div class="prod-name">${esc(p.name)}</div>
              <div class="prod-sku">${p.sku ? esc(p.sku) : p.barcode ? esc(p.barcode) : '—'}</div>
            </div>
          </div>
        </td>
        <td style="color:var(--muted);font-size:12px">${p.category ? esc(p.category.name) : '—'}</td>
        <td><span class="price-cell">₦${fmt(p.price)}</span></td>
        <td><span class="cost-cell">${p.costPrice ? '₦' + fmt(p.costPrice) : '—'}</span></td>
        <td>
          <div class="stock-cell">
            <span class="stock-num ${stockClass}">${p.stock}</span>
            <div class="stock-bar"><div class="stock-bar-fill ${stockClass}" style="width:${barPct}%"></div></div>
          </div>
        </td>
        <td><span class="badge ${p.active !== false ? 'badge-active' : 'badge-inactive'}">${p.active !== false ? 'Active' : 'Inactive'}</span></td>
        <td>
          <div class="actions">
            <button class="btn-icon" title="Edit" onclick="openModal('${p.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon" title="Adjust Stock" onclick="adjustStock('${p.id}', '${esc(p.name)}', ${p.stock})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="btn-icon danger" title="Delete" onclick="deleteProduct('${p.id}', '${esc(p.name)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  /* ── Open modal ── */
  window.openModal = (id = null) => {
    editingId = id;
    document.getElementById('modalTitle').textContent = id ? 'Edit Product' : 'Add Product';
    document.getElementById('saveBtn').textContent    = id ? 'Update Product' : 'Save Product';

    if (id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      document.getElementById('fName').value        = p.name || '';
      document.getElementById('fSku').value         = p.sku || '';
      document.getElementById('fBarcode').value     = p.barcode || '';
      document.getElementById('fCategory').value    = p.categoryId || '';
      document.getElementById('fUnit').value        = p.unit || '';
      document.getElementById('fDescription').value = p.description || '';
      document.getElementById('fPrice').value       = p.price || '';
      document.getElementById('fCostPrice').value   = p.costPrice || '';
      document.getElementById('fStock').value       = p.stock ?? '';
      document.getElementById('fLowStock').value    = p.lowStockThreshold || '';
      document.getElementById('fTaxRate').value     = p.taxRate || '';
      document.getElementById('fSupplier').value    = p.supplierId || '';
    } else {
      document.getElementById('fName').value        = '';
      document.getElementById('fSku').value         = '';
      document.getElementById('fBarcode').value     = '';
      document.getElementById('fCategory').value    = '';
      document.getElementById('fUnit').value        = '';
      document.getElementById('fDescription').value = '';
      document.getElementById('fPrice').value       = '';
      document.getElementById('fCostPrice').value   = '';
      document.getElementById('fStock').value       = '0';
      document.getElementById('fLowStock').value    = '5';
      document.getElementById('fTaxRate').value     = '';
      document.getElementById('fSupplier').value    = '';
    }

    document.getElementById('modalOverlay').classList.add('open');
  };

  window.closeModal = () => {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  };

  window.handleOverlayClick = (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  };

  /* ── Save product ── */
  window.saveProduct = async () => {
    const name  = document.getElementById('fName').value.trim();
    const price = parseFloat(document.getElementById('fPrice').value);
    const stock = parseInt(document.getElementById('fStock').value);

    if (!name)          return showToast('Product name is required', 'error');
    if (isNaN(price))   return showToast('Selling price is required', 'error');
    if (isNaN(stock))   return showToast('Stock quantity is required', 'error');

    const payload = {
      name,
      sku:               document.getElementById('fSku').value.trim()         || undefined,
      barcode:           document.getElementById('fBarcode').value.trim()     || undefined,
      categoryId:        document.getElementById('fCategory').value           || undefined,
      unit:              document.getElementById('fUnit').value.trim()        || undefined,
      description:       document.getElementById('fDescription').value.trim() || undefined,
      price,
      costPrice:         parseFloat(document.getElementById('fCostPrice').value) || undefined,
      stock,
      lowStockThreshold: parseInt(document.getElementById('fLowStock').value) || undefined,
      taxRate:           parseFloat(document.getElementById('fTaxRate').value) || undefined,
      supplierId:        document.getElementById('fSupplier').value           || undefined,
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = editingId ? 'Updating…' : 'Saving…';

    try {
      const url    = editingId ? `${API}/api/products/${editingId}` : `${API}/api/products`;
      const method = editingId ? 'PUT' : 'POST';
      const res    = await fetch(url, { method, headers, body: JSON.stringify(payload) });
      const data   = await res.json();
      if (!res.ok) throw new Error(data.message);

      showToast(editingId ? '✓ Product updated' : '✓ Product added', 'success');
      closeModal();
      await loadProducts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = editingId ? 'Update Product' : 'Save Product';
    }
  };

  /* ── Adjust stock ── */
  window.adjustStock = async (id, name, current) => {
    const val = prompt(`Adjust stock for "${name}"\nCurrent: ${current}\n\nEnter new quantity:`);
    if (val === null) return;
    const qty = parseInt(val);
    if (isNaN(qty) || qty < 0) return showToast('Invalid quantity', 'error');

    try {
      const res  = await fetch(`${API}/api/products/${id}/stock`, {
        method: 'PATCH', headers, body: JSON.stringify({ quantity: qty }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      showToast(`✓ Stock updated to ${qty}`, 'success');
      await loadProducts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  };

  /* ── Delete product ── */
  window.deleteProduct = async (id, name) => {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      const res  = await fetch(`${API}/api/products/${id}`, { method: 'DELETE', headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      showToast('Product deleted', 'success');
      await loadProducts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  };

  /* ── Logout ── */
  window.logout = () => {
    localStorage.removeItem('cnjohnson_access_token');
    localStorage.removeItem('cnjohnson_auth');
    window.location.href = 'login.html';
  };

  /* ── Helpers ── */
  function fmt(n) { return Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = type; }, 3500);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  loadAll();
})();
</script>
</body>
</html>
