<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | CN-Johnson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --card:       #141414;
      --border:     #2a2a2a;
      --border-focus: #c9a84c;
      --gold:       #c9a84c;
      --gold-light: #e2c47a;
      --text:       #f0ece4;
      --muted:      #7a7570;
      --error-bg:   #2a1212;
      --error-border:#7f2020;
      --error-text: #f87171;
      --success-bg: #0d2414;
      --success-border:#1a5c30;
      --success-text:#4ade80;
      --radius:     10px;
      --transition: 0.2s ease;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
      z-index: 1;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.06);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 -36px 28px;
    }

    /* ── Role Buttons ── */
    .role-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 22px;
    }

    .role-btn {
      padding: 9px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
    }

    .role-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .role-btn.active {
      background: rgba(201,168,76,0.12);
      border-color: var(--gold);
      color: var(--gold-light);
      font-weight: 500;
    }

    /* ── Name row ── */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Form Fields ── */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
    }

    .field input::placeholder { color: #3d3a36; }

    .field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    /* ── Password wrapper (for show/hide toggle) ── */
    .pass-wrap {
      position: relative;
    }

    .pass-wrap input { padding-right: 42px; }

    .toggle-pass {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      line-height: 1;
      transition: color var(--transition);
    }

    .toggle-pass:hover { color: var(--gold); }

    /* ── Strength meter ── */
    .strength-wrap {
      margin-top: 6px;
      display: none;
    }

    .strength-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    .strength-label {
      font-size: 11px;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ── Banners ── */
    .banner {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .banner.error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .banner.success {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(135deg, #c9a84c, #a8863a);
      border: none;
      border-radius: var(--radius);
      color: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    }

    .submit-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(201,168,76,0.35);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Footer link ── */
    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-link a, .footer-link button {
      color: var(--gold);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      text-decoration: none;
      transition: color var(--transition);
      padding: 0;
    }

    .footer-link a:hover, .footer-link button:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
      .name-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-name">C.N. Johnson</div>
        <div class="brand-sub">Create your account</div>
      </div>

      <div class="divider"></div>

      <!-- Banners -->
      <div id="errorBox"   class="banner error"   role="alert"></div>
      <div id="successBox" class="banner success" role="status"></div>

      <!-- Role Selector -->
      <div class="role-row" style="grid-template-columns:1fr 1fr 1fr;">
        <button class="role-btn active" data-role="admin"   aria-pressed="true">Admin</button>
        <button class="role-btn"        data-role="manager" aria-pressed="false">Manager</button>
        <button class="role-btn"        data-role="cashier" aria-pressed="false">Cashier</button>
      </div>

      <!-- Name Row -->
      <div class="name-row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name" />
        </div>
        <div class="field">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name" />
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jane@example.com" autocomplete="email" />
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="pass-wrap">
          <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
          <button class="toggle-pass" type="button" aria-label="Toggle password visibility" data-target="password">
            <!-- eye icon -->
            <svg id="eye-password" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Strength meter -->
        <div class="strength-wrap" id="strengthWrap">
          <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <div class="pass-wrap">
          <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" />
          <button class="toggle-pass" type="button" aria-label="Toggle confirm password visibility" data-target="confirmPassword">
            <svg id="eye-confirmPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="submit-btn" id="signUpBtn">Sign Up</button>

      <!-- Footer -->
      <div class="footer-link">
        Already have an account? <a href="login.html">Sign In</a>
      </div>

    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const API_URL = 'https://cn-active-backend-1.onrender.com';

    /* ── DOM ── */
    const firstNameInput   = document.getElementById('firstName');
    const lastNameInput    = document.getElementById('lastName');
    const emailInput       = document.getElementById('email');
    const passInput        = document.getElementById('password');
    const confirmPassInput = document.getElementById('confirmPassword');
    const signUpBtn        = document.getElementById('signUpBtn');
    const errorBox         = document.getElementById('errorBox');
    const successBox       = document.getElementById('successBox');
    const strengthWrap     = document.getElementById('strengthWrap');
    const strengthFill     = document.getElementById('strengthFill');
    const strengthLabel    = document.getElementById('strengthLabel');
    const roleBtns         = document.querySelectorAll('.role-btn');

    let selectedRole = 'admin'; // mapped to ADMIN in controller

    /* ── Role selector ── */
    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        selectedRole = btn.dataset.role;
      });
    });

    /* ── Show/hide password ── */
    document.querySelectorAll('.toggle-pass').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        const svg = btn.querySelector('svg');
        svg.innerHTML = isHidden
          ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      });
    });

    /* ── Password strength ── */
    function getStrength(pw) {
      let s = 0;
      if (pw.length >= 8)           s++;
      if (pw.length >= 12)          s++;
      if (/[A-Z]/.test(pw))        s++;
      if (/[0-9]/.test(pw))        s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      const map = [
        null,
        { label: 'Weak',        color: '#ef4444' },
        { label: 'Fair',        color: '#f97316' },
        { label: 'Good',        color: '#eab308' },
        { label: 'Strong',      color: '#22c55e' },
        { label: 'Very Strong', color: '#16a34a' },
      ];
      return { score: s, ...(map[Math.max(1, s)]) };
    }

    passInput.addEventListener('input', () => {
      if (!passInput.value) { strengthWrap.style.display = 'none'; return; }
      strengthWrap.style.display = 'block';
      const { score, label, color } = getStrength(passInput.value);
      strengthFill.style.width           = `${(score / 5) * 100}%`;
      strengthFill.style.backgroundColor = color;
      strengthLabel.textContent          = `Strength: ${label}`;
      strengthLabel.style.color          = color;
    });

    /* ── Helpers ── */
    const isValidEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

    function showError(msg) {
      successBox.style.display = 'none';
      errorBox.textContent = msg; errorBox.style.display = 'block';
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function showSuccess(msg) {
      errorBox.style.display = 'none';
      successBox.textContent = msg; successBox.style.display = 'block';
    }
    function clearAll() {
      errorBox.style.display = successBox.style.display = 'none';
    }
    function setLoading(on) {
      signUpBtn.disabled    = on;
      signUpBtn.textContent = on ? 'Creating account…' : 'Sign Up';
    }

    /* ── Enter key ── */
    [firstNameInput, lastNameInput, emailInput, passInput, confirmPassInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') signUpBtn.click(); });
    });

    /* ── Sign Up ── */
    signUpBtn.addEventListener('click', async () => {
      clearAll();

      const firstName   = firstNameInput.value.trim();
      const lastName    = lastNameInput.value.trim();
      const email       = emailInput.value.trim();
      const password    = passInput.value.trim();
      const confirmPass = confirmPassInput.value.trim();

      if (!email || !password)              { showError('Email and password are required.'); return; }
      if (!isValidEmail(email))             { showError('Please enter a valid email address.'); emailInput.focus(); return; }
      if (password.length < 6)             { showError('Password must be at least 6 characters.'); passInput.focus(); return; }
      if (password !== confirmPass)        { showError('Passwords do not match.'); confirmPassInput.focus(); return; }
      const { score, label } = getStrength(password);
      if (score < 2) { showError(`Password is too weak (${label}). Add uppercase letters, numbers, or symbols.`); passInput.focus(); return; }

      setLoading(true);

      try {
        const payload = { email, password, role: selectedRole };
        if (firstName) payload.firstName = firstName;
        if (lastName)  payload.lastName  = lastName;

        const res  = await fetch(`${API_URL}/api/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (res.status === 409) { showError('An account with this email already exists. Try signing in.'); return; }
        if (!res.ok)            { showError(data.message || `Signup failed (${res.status}). Please try again.`); return; }

        // Account is always pending — never auto-login
        localStorage.setItem('cnj_pending_email', email);
        localStorage.removeItem('cnjohnson_access_token');
        localStorage.removeItem('cnjohnson_auth');
        showSuccess('Account created! Redirecting…');
        setTimeout(() => { window.location.href = 'pending.html'; }, 1200);

      } catch (err) {
        showError(err.name === 'TypeError' ? 'Could not reach the server. Check your connection.' : 'An unexpected error occurred.');
        console.error('[CNJ Signup]', err);
      } finally {
        setLoading(false);
      }
    });

  })();
  </script>
</body>
</html>
